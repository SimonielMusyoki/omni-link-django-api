$kind: http-request
name: Update Inventory
method: PATCH
url: '{{base_url}}/api/inventory/{{inventory_id}}/'
order: 3000
pathVariables:
  - key: inventory_id
    value: '{{inventory_id}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "quantity": 100,
      "reserved_quantity": 10,
      "reorder_point": 20,
      "reorder_quantity": 50
    }
