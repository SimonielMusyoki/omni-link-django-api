$kind: http-request
name: Update Product
method: PUT
url: '{{base_url}}/api/products/:id/'
order: 4000
pathVariables:
  - key: id
    value: '{{product_id}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Updated Test Product",
      "sku": "TEST-SKU-001",
      "description": "An updated test product",
      "category": "{{category_id}}",
      "price": "34.99",
      "cost": "17.50",
      "weight": "0.5",
      "weight_unit": "kg",
      "is_active": true,
      "is_kit": false,
      "barcode": "1234567890123",
      "min_stock_level": 15
    }
