$kind: http-request
name: Update Product
method: PUT
url: '{{base_url}}/api/products/{{product_id}}/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: -
    {
      "name": "Updated Product",
      "description": "Updated product description",
      "sku": "PROD-001",
      "category": "{{category_id}}",
      "price": "39.99",
      "reorder_level": 15,
      "image_url": "https://example.com/images/product-updated.jpg",
      "is_bundle": false
    }
