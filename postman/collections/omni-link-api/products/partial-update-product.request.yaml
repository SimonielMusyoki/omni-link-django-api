$kind: http-request
name: Partial Update Product
method: PATCH
url: '{{base_url}}/api/products/:id/'
order: 5000
pathVariables:
  - key: id
    value: '{{product_id}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "price": "39.99",
      "is_active": true
    }
