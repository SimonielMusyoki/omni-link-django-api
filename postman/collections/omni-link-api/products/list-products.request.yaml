$kind: http-request
name: List Products
method: GET
url: '{{base_url}}/api/products/'
order: 1000
queryParams:
  - key: category
    value: ''
    description: Filter by category ID
    disabled: true
  - key: is_bundle
    value: ''
    description: 'Filter by bundle status: true or false'
    disabled: true
  - key: search
    value: ''
    description: Search by name, SKU, or description
    disabled: true
  - key: ordering
    value: '-created_at'
    description: 'Order by: name, price, created_at (prefix with - for descending)'
    disabled: true
