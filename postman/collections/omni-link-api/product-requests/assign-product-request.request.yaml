$kind: http-request
name: Assign Product Request
description: Assign a request to a user for handling
method: POST
url: '{{base_url}}/api/requests/{{request_id}}/assign/'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "assigned_to": "{{user_id}}"
    }

