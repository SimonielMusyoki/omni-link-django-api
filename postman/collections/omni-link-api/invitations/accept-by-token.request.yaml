$kind: http-request
name: Accept Invitation by Token
description: Accept an invitation using the token (no invitation ID needed)
method: POST
url: '{{base_url}}/api/invitations/accept_by_token/'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "token": "your-invitation-token-here"
    }

