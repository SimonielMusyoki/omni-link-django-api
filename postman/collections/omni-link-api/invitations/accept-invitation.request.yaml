$kind: http-request
name: Accept Invitation
method: POST
url: '{{base_url}}/api/invitations/accept/'
order: 6000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: noauth
body:
  type: json
  content: |-
    {
      "token": "{{invitation_token}}",
      "first_name": "New",
      "last_name": "User",
      "password": "SecurePassword123!",
      "password_confirm": "SecurePassword123!"
    }
