$kind: http-request
name: Update Category
method: PUT
url: '{{base_url}}/api/categories/:id/'
order: 4000
pathVariables:
  - key: id
    value: '{{category_id}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Electronics Updated",
      "description": "Updated description for electronics",
      "parent": null,
      "is_active": true
    }
