$kind: http-request
name: Update Order
method: PUT
url: '{{base_url}}/api/orders/{{order_id}}/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "customer_name": "John Doe Updated",
      "customer_email": "john.updated@example.com",
      "customer_phone": "+1234567890",
      "shipping_address": {
        "street": "456 Oak Ave",
        "city": "Los Angeles",
        "state": "CA",
        "postal_code": "90001",
        "country": "US"
      },
      "billing_address": {
        "street": "456 Oak Ave",
        "city": "Los Angeles",
        "state": "CA",
        "postal_code": "90001",
        "country": "US"
      },
      "notes": "Updated delivery instructions"
    }
