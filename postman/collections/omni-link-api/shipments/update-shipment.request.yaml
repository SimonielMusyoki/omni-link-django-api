$kind: http-request
name: Update Shipment
method: PUT
url: '{{base_url}}/api/shipments/{{shipment_id}}/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "order": "{{order_id}}",
      "carrier": "ups",
      "service_type": "express",
      "tracking_number": "1Z999AA10123456784",
      "weight": "2.5",
      "dimensions": {
        "length": "12",
        "width": "8",
        "height": "6"
      },
      "shipping_cost": "25.99",
      "estimated_delivery": "2024-12-18",
      "notes": "Updated shipment details"
    }
