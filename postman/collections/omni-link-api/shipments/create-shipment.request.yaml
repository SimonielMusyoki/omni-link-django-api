$kind: http-request
name: Create Shipment
method: POST
url: '{{base_url}}/api/shipments/'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "order": "{{order_id}}",
      "carrier": "fedex",
      "service_type": "ground",
      "tracking_number": "794644790132",
      "weight": "2.5",
      "dimensions": {
        "length": "12",
        "width": "8",
        "height": "6"
      },
      "shipping_cost": "15.99",
      "estimated_delivery": "2024-12-20",
      "notes": "Handle with care"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.response.code === 201) {
        const response = pm.response.json();
        if (response.id) {
          pm.collectionVariables.set("shipment_id", response.id);
          console.log("Shipment ID saved:", response.id);
        }
        if (response.tracking_number) {
          pm.collectionVariables.set("tracking_number", response.tracking_number);
          console.log("Tracking Number saved:", response.tracking_number);
        }
      }
