$kind: http-request
name: Create Product Transfer
method: POST
url: '{{base_url}}/api/product-transfers/'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "source_warehouse": "{{warehouse_id}}",
      "destination_warehouse": "{{destination_warehouse_id}}",
      "product": "{{product_id}}",
      "quantity": 25,
      "notes": "Stock rebalancing transfer"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.response.code === 201) {
        const response = pm.response.json();
        if (response.id) {
          pm.collectionVariables.set("transfer_id", response.id);
          console.log("Transfer ID saved:", response.id);
        }
      }
