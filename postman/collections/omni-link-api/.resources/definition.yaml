$kind: collection
name: Omni Link API
description: >-
  Complete API collection for the Omni Link platform - a multi-warehouse
  inventory management system with products, categories, bundles, inventory
  tracking, orders, shipments, product requests, invitations, and integrations.
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
variables:
  base_url: http://localhost:8000
  access_token: ""
  refresh_token: ""
  user_id: "1"
  product_id: "1"
  category_id: "1"
  warehouse_id: "1"
  kit_item_id: "1"
  inventory_id: "1"
  transfer_id: "1"
  integration_id: "1"
  order_id: "1"
  shipment_id: "1"
  request_id: "1"
  invitation_id: "1"
