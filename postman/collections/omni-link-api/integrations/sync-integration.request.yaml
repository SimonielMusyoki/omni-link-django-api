$kind: http-request
name: Sync Integration
method: POST
url: '{{base_url}}/api/integrations/{{integration_id}}/sync/'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "sync_type": "full",
      "sync_products": true,
      "sync_orders": true,
      "sync_inventory": true
    }
