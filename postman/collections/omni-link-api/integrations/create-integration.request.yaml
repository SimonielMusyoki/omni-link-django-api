$kind: http-request
name: Create Integration
method: POST
url: '{{base_url}}/api/integrations/'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Shopify Store",
      "platform": "shopify",
      "api_key": "your-api-key",
      "api_secret": "your-api-secret",
      "store_url": "https://your-store.myshopify.com",
      "is_active": true,
      "sync_products": true,
      "sync_orders": true,
      "sync_inventory": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.response.code === 201) {
        const response = pm.response.json();
        if (response.id) {
          pm.collectionVariables.set("integration_id", response.id);
          console.log("Integration ID saved:", response.id);
        }
      }
