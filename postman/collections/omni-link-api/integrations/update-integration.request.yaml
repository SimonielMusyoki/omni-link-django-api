$kind: http-request
name: Update Integration
method: PUT
url: '{{base_url}}/api/integrations/{{integration_id}}/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Shopify Store - Updated",
      "platform": "shopify",
      "api_key": "updated-api-key",
      "api_secret": "updated-api-secret",
      "store_url": "https://your-store.myshopify.com",
      "is_active": true,
      "sync_products": true,
      "sync_orders": true,
      "sync_inventory": true
    }
