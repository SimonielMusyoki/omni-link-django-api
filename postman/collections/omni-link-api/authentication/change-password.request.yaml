$kind: http-request
name: Change Password
method: POST
url: '{{base_url}}/api/auth/change-password/'
order: 8000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "old_password": "OldPass123!",
      "new_password": "NewPass123!",
      "new_password_confirm": "NewPass123!"
    }
