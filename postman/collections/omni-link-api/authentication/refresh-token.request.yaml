$kind: http-request
name: Refresh Token
method: POST
url: '{{base_url}}/api/auth/token/refresh/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: noauth
body:
  type: json
  content: |-
    {
      "refresh": "{{refresh_token}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.response.code === 200) {
          const response = pm.response.json();
          if (response.access) {
              pm.collectionVariables.set("access_token", response.access);
          }
      }
