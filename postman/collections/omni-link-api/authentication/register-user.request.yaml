$kind: http-request
name: Register User
method: POST
url: '{{base_url}}/api/auth/register/'
order: 1000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: noauth
body:
  type: json
  content: |-
    {
      "email": "newuser@example.com",
      "password": "securePassword123!",
      "password_confirm": "securePassword123!",
      "first_name": "John",
      "last_name": "Doe"
    }
