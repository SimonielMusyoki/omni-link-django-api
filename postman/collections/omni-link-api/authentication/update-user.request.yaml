$kind: http-request
name: Update User
method: PUT
url: '{{base_url}}/api/auth/users/:id/'
order: 11000
pathVariables:
  - key: id
    value: '{{user_id}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "first_name": "John",
      "last_name": "Doe",
      "is_active": true,
      "role": "member"
    }
