$kind: http-request
name: Partial Update Warehouse
method: PATCH
url: '{{base_url}}/api/warehouses/:id/'
order: 5000
pathVariables:
  - key: id
    value: '{{warehouse_id}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "is_active": false
    }
