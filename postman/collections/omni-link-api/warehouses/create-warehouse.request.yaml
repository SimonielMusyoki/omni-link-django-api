$kind: http-request
name: Create Warehouse
method: POST
url: '{{base_url}}/api/warehouses/'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Main Warehouse",
      "code": "WH-001",
      "address": {
        "street": "123 Industrial Blvd",
        "city": "Chicago",
        "state": "IL",
        "postal_code": "60601",
        "country": "US"
      },
      "contact_name": "John Manager",
      "contact_email": "warehouse@example.com",
      "contact_phone": "+1234567890",
      "is_active": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.response.code === 201) {
          const response = pm.response.json();
          if (response.id) {
              pm.collectionVariables.set("warehouse_id", response.id);
          }
      }
