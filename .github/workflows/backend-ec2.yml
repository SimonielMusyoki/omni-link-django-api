name: Deploy Django API to EC2

on:
  push:
    branches:
      - main

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Run tests before deploying
  # ────────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: omnilink_test
          POSTGRES_USER: omnilink_user
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: api.settings
          DB_NAME: omnilink_test
          DB_USER: omnilink_user
          DB_PASSWORD: testpass
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: "False"
        run: python -m pytest -q --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Deploy to EC2 (only if tests pass)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'

          set -euo pipefail

          APP_ROOT="/opt/omnilink"
          PROJECT_DIR="${APP_ROOT}/project"
          VENV_DIR="${APP_ROOT}/venv"
          ENV_FILE="${APP_ROOT}/.env.prod"
          STATIC_ROOT="/var/www/omnilink/staticfiles"
          MEDIA_ROOT="/var/www/omnilink/media"
          LOG_DIR_GUNICORN="/var/log/gunicorn"
          API_DOMAIN="api-wms.uncoverskincare.co"
          TLS_CERT_DIR="/etc/letsencrypt/live/${API_DOMAIN}"
          DEPLOY_USER="$(id -un)"
          DEPLOY_GROUP="$(id -gn)"
          PYTHON_BIN="$(command -v python3.13 || command -v python3.12 || command -v python3.11 || command -v python3 || true)"

          echo "────────────────────────────────────"
          echo " Omni Link API — Rolling Deployment"
          echo "────────────────────────────────────"

          echo "[bootstrap] Ensuring deploy directories exist and are writable..."
          sudo mkdir -p "${APP_ROOT}" "${STATIC_ROOT}" "${MEDIA_ROOT}" "${LOG_DIR_GUNICORN}"
          sudo chown "${DEPLOY_USER}:${DEPLOY_GROUP}" "${APP_ROOT}"
          sudo chown -R "${DEPLOY_USER}:www-data" /var/www/omnilink
          sudo chown -R "${DEPLOY_USER}:www-data" "${LOG_DIR_GUNICORN}"
          mkdir -p "${PROJECT_DIR}"

          echo "[bootstrap] Ensuring Python virtualenv exists..."
          if [ -z "${PYTHON_BIN}" ]; then
            echo "❌ No python3 interpreter found on the server. Install Python before deploying."
            exit 1
          fi
          if [ ! -x "${VENV_DIR}/bin/python" ]; then
            echo "[init] Creating virtualenv with ${PYTHON_BIN}..."
            "${PYTHON_BIN}" -m venv "${VENV_DIR}"
          fi
          "${VENV_DIR}/bin/python" -m pip install --quiet --upgrade pip wheel setuptools

          echo "[bootstrap] Ensuring production env file exists..."
          if [ ! -f "${ENV_FILE}" ]; then
            {
              printf '%s\n' '# Omni Link – Production Environment Variables'
              printf '%s\n' '# Fill in every value, then re-run the deploy workflow.'
              printf '%s\n' 'DJANGO_SECRET_KEY=REPLACE_WITH_LONG_RANDOM_SECRET'
              printf '%s\n' 'DJANGO_DEBUG=False'
              printf '%s\n' 'DJANGO_ALLOWED_HOSTS=api-wms.uncoverskincare.co'
              printf '%s\n' 'DB_NAME=omnilink_prod'
              printf '%s\n' 'DB_USER=omnilink_app_user'
              printf '%s\n' 'DB_PASSWORD=REPLACE_WITH_RDS_PASSWORD'
              printf '%s\n' 'DB_HOST=REPLACE.rds.amazonaws.com'
              printf '%s\n' 'DB_PORT=5432'
              printf '%s\n' 'STATIC_ROOT=/var/www/omnilink/staticfiles'
              printf '%s\n' 'MEDIA_ROOT=/var/www/omnilink/media'
              printf '%s\n' 'GOOGLE_OAUTH_CLIENT_ID='
              printf '%s\n' 'GOOGLE_OAUTH_CLIENT_SECRET='
              printf '%s\n' 'SHOPIFY_WEBHOOK_SECRET='
              printf '%s\n' 'DEFAULT_FROM_EMAIL=noreply@uncoverskincare.com'
              printf '%s\n' 'EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend'
              printf '%s\n' 'EMAIL_HOST=smtp.yourprovider.com'
              printf '%s\n' 'EMAIL_PORT=587'
              printf '%s\n' 'EMAIL_HOST_USER=noreply@uncoverskincare.com'
              printf '%s\n' 'EMAIL_HOST_PASSWORD='
              printf '%s\n' 'EMAIL_USE_TLS=True'
              printf '%s\n' 'CELERY_BROKER_URL=redis://127.0.0.1:6379/0'
              printf '%s\n' 'CELERY_RESULT_BACKEND=redis://127.0.0.1:6379/0'
              printf '%s\n' 'CELERY_TASK_ALWAYS_EAGER=False'
            } > "${ENV_FILE}"
            chmod 640 "${ENV_FILE}"
            echo "❌ Created ${ENV_FILE}. Fill it with real production values, then re-run the workflow."
            exit 1
          fi

          # ── Clone repo on first deploy ──────────────────────────────────────
          if [ ! -d "${PROJECT_DIR}/.git" ]; then
            echo "[init] Cloning repository..."
            rm -rf "${PROJECT_DIR}"
            git clone ${{ secrets.EC2_BACKEND_REPO_URL }} "${PROJECT_DIR}"
          fi

          # ── Pull latest code ────────────────────────────────────────────────
          echo "[1/6] Pulling latest code..."
          git -C "${PROJECT_DIR}" fetch --all --prune
          git -C "${PROJECT_DIR}" reset --hard origin/main

          # ── Copy updated deploy files ───────────────────────────────────────
          echo "[2/6] Syncing Gunicorn service and Nginx config..."

          sudo cp "${PROJECT_DIR}/deploy/systemd/gunicorn.service" \
                  "/etc/systemd/system/omnilink-gunicorn.service"
          sudo systemctl daemon-reload

          sudo cp "${PROJECT_DIR}/deploy/nginx/default.conf" \
                  "/etc/nginx/sites-available/omnilink"
          sudo ln -sf /etc/nginx/sites-available/omnilink \
                      /etc/nginx/sites-enabled/omnilink
            sudo rm -f /etc/nginx/sites-enabled/default

          if ! sudo test -f "${TLS_CERT_DIR}/fullchain.pem" || ! sudo test -f "${TLS_CERT_DIR}/privkey.pem"; then
            echo "❌ Missing TLS certificate for ${API_DOMAIN}."
            echo "   Expected files: ${TLS_CERT_DIR}/fullchain.pem and ${TLS_CERT_DIR}/privkey.pem"
            echo "   Issue cert on EC2 first:"
            echo "   sudo certbot --nginx -d ${API_DOMAIN} --non-interactive --agree-tos -m admin@uncoverskincare.com"
            exit 1
          fi

          sudo nginx -t

          # ── Install / update Python dependencies ────────────────────────────
          echo "[3/6] Installing Python dependencies..."
          "${VENV_DIR}/bin/pip" install --quiet -r "${PROJECT_DIR}/requirements.txt"

          # ── Django management commands ──────────────────────────────────────
          echo "[4/6] Running migrations..."
          cd "${PROJECT_DIR}"
          set -a
          source "${ENV_FILE}"
          set +a
          export DJANGO_SETTINGS_MODULE=api.settings_production

          "${VENV_DIR}/bin/python" manage.py migrate --noinput

          echo "[5/6] Collecting static files..."
          "${VENV_DIR}/bin/python" manage.py collectstatic --noinput --clear

          # ── Restart services ─────────────────────────────────────────────────
          echo "[6/6] Restarting Gunicorn and reloading Nginx..."
          sudo systemctl restart omnilink-gunicorn
          sudo systemctl reload nginx

          # ── Health check ─────────────────────────────────────────────────────
          echo "Verifying deployment..."
          sleep 3
          curl -sf http://127.0.0.1:8000/healthz && echo "✅ Gunicorn is up" || echo "⚠️  Health check failed"

          echo ""
          echo "✅ Deployment complete!"

          ENDSSH
