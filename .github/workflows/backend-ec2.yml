name: Backend CI/CD (EC2)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: backend-prod-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (SQLite settings)
        env:
          DJANGO_SETTINGS_MODULE: api.settings_sqlite_test
        run: |
          python -m pytest -q

  deploy:
    name: Deploy backend to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.EC2_DEPLOY_PATH }}"
            REPO_URL="${{ secrets.EC2_BACKEND_REPO_URL }}"
            BRANCH="main"
            VENV_PATH="$APP_DIR/.venv"
            GUNICORN_SERVICE="${{ secrets.GUNICORN_SERVICE_NAME }}"
            NGINX_SERVICE="${{ secrets.NGINX_SERVICE_NAME }}"

            if [ -z "$GUNICORN_SERVICE" ]; then GUNICORN_SERVICE="gunicorn"; fi
            if [ -z "$NGINX_SERVICE" ]; then NGINX_SERVICE="nginx"; fi

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            cat > .env.prod <<'EOF'
            ${{ secrets.DJANGO_ENV_FILE }}
            EOF

            if [ ! -d "$VENV_PATH" ]; then
              python3 -m venv "$VENV_PATH"
            fi

            source "$VENV_PATH/bin/activate"
            pip install --upgrade pip
            pip install -r requirements.txt

            set -a
            source .env.prod
            set +a

            python manage.py migrate
            python manage.py collectstatic --noinput
            python manage.py check

            sudo systemctl restart "$GUNICORN_SERVICE"
            sudo systemctl reload "$NGINX_SERVICE"

