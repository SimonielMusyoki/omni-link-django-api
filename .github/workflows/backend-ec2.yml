name: Deploy Django API to EC2

on:
  push:
    branches:
      - main

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Run tests before deploying
  # ────────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: omnilink_test
          POSTGRES_USER: omnilink_user
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: api.settings
          DB_NAME: omnilink_test
          DB_USER: omnilink_user
          DB_PASSWORD: testpass
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: "False"
        run: python -m pytest -q --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Deploy to EC2 (only if tests pass)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' << 'ENDSSH'

          set -euo pipefail

          APP_ROOT="/opt/omnilink"
          PROJECT_DIR="${APP_ROOT}/project"
          VENV_DIR="${APP_ROOT}/venv"

          echo "────────────────────────────────────"
          echo " Omni Link API — Rolling Deployment"
          echo "────────────────────────────────────"

          # ── Clone repo on first deploy ──────────────────────────────────────
          if [ ! -d "${PROJECT_DIR}/.git" ]; then
            echo "[init] Cloning repository..."
            git clone ${{ secrets.EC2_BACKEND_REPO_URL }} "${PROJECT_DIR}"
          fi

          # ── Pull latest code ────────────────────────────────────────────────
          echo "[1/6] Pulling latest code..."
          git -C "${PROJECT_DIR}" fetch --all
          git -C "${PROJECT_DIR}" reset --hard origin/main

          # ── Copy updated deploy files ───────────────────────────────────────
          echo "[2/6] Syncing Gunicorn service and Nginx config..."

          sudo cp "${PROJECT_DIR}/deploy/systemd/gunicorn.service" \
                  "/etc/systemd/system/omnilink-gunicorn.service"
          sudo systemctl daemon-reload

          sudo cp "${PROJECT_DIR}/deploy/nginx/default.conf" \
                  "/etc/nginx/sites-available/omnilink"
          sudo ln -sf /etc/nginx/sites-available/omnilink \
                      /etc/nginx/sites-enabled/omnilink
          sudo nginx -t

          # ── Install / update Python dependencies ────────────────────────────
          echo "[3/6] Installing Python dependencies..."
          "${VENV_DIR}/bin/pip" install --quiet --upgrade pip
          "${VENV_DIR}/bin/pip" install --quiet -r "${PROJECT_DIR}/requirements.txt"

          # ── Django management commands ──────────────────────────────────────
          echo "[4/6] Running migrations..."
          cd "${PROJECT_DIR}"
          source "${APP_ROOT}/.env.prod"
          export $(grep -v '^#' "${APP_ROOT}/.env.prod" | xargs)

          "${VENV_DIR}/bin/python" manage.py migrate --noinput

          echo "[5/6] Collecting static files..."
          "${VENV_DIR}/bin/python" manage.py collectstatic --noinput --clear

          # ── Restart services ─────────────────────────────────────────────────
          echo "[6/6] Restarting Gunicorn and reloading Nginx..."
          sudo systemctl restart omnilink-gunicorn
          sudo systemctl reload nginx

          # ── Health check ─────────────────────────────────────────────────────
          echo "Verifying deployment..."
          sleep 3
          curl -sf http://127.0.0.1:8000/healthz && echo "✅ Gunicorn is up" || echo "⚠️  Health check failed"

          echo ""
          echo "✅ Deployment complete!"

          ENDSSH
