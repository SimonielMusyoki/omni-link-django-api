name: Deploy Django API to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          echo "Navigating to deployment directory"

          cd ${{ secrets.EC2_DEPLOY_PATH }}

          if [ ! -d "project" ]; then
            echo "Cloning repository"
            git clone ${{ secrets.EC2_BACKEND_REPO_URL }} project
          fi

          cd project

          echo "Pulling latest code"
          git pull origin main

          echo "Activating virtual environment"
          source ../venv/bin/activate

          echo "Installing dependencies"
          pip install -r ../requirements.txt

          echo "Running migrations"
          python manage.py migrate --noinput

          echo "Collecting static files"
          python manage.py collectstatic --noinput

          echo "Restarting Gunicorn"
          sudo systemctl restart ${{ secrets.GUNICORN_SERVICE_NAME }}

          echo "Reloading Nginx"
          sudo systemctl reload ${{ secrets.NGINX_SERVICE_NAME }}

          echo "Deployment complete"

          EOF