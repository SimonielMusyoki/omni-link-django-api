# HTTP → HTTPS redirect
server {
    listen 80;
    server_name wms.uncoverskincare.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS – main block
server {
    listen 443 ssl http2;
    server_name wms.uncoverskincare.com;

    # ----- TLS (Let's Encrypt via certbot) -----
    ssl_certificate     /etc/letsencrypt/live/wms.uncoverskincare.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wms.uncoverskincare.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (uncomment once you are confident TLS is stable)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ----- Security headers -----
    add_header X-Content-Type-Options   nosniff       always;
    add_header X-Frame-Options          DENY          always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ----- Upload size -----
    client_max_body_size 50m;

    # ----- Static files -----
    location /static/ {
        alias /var/www/omnilink/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    # ----- Media files -----
    location /media/ {
        alias /var/www/omnilink/media/;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ----- Health check -----
    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # ----- Django API -----
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;
    }

    # ----- Logging -----
    access_log /var/log/nginx/omnilink_access.log;
    error_log  /var/log/nginx/omnilink_error.log warn;
}
