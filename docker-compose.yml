version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: omnilink_postgres
    environment:
      POSTGRES_DB: omnilink_db
      POSTGRES_USER: omnilink_user
      POSTGRES_PASSWORD: omnilink_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnilink_user -d omnilink_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: omnilink_api
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=omnilink_db
      - DB_USER=omnilink_user
      - DB_PASSWORD=omnilink_password
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=True
      - PSYCOPG_IMPL=binary
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
